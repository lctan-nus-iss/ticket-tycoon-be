spring:
  application:
    name: ticker-tycoon-backend
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
    openai:
      api-key: ${OPENAI_API_KEY:}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  datasource:
    url: jdbc:postgresql://localhost:5432/tickertycoon
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  web:
    cors:
      allowed-origins: "http://localhost:5173,http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
  endpoint:
    health:
      show-details: always

llm:
  providers:
    anthropic:
      base-url: https://api.anthropic.com
      api-key: ${ANTHROPIC_API_KEY}
      default-model: claude-haiku-4-5-20251001
      timeout-seconds: 30

    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:}
      default-model: gpt-4o-mini
      timeout-seconds: 30

    gemini:
      base-url: https://generativelanguage.googleapis.com
      api-key: ${GEMINI_API_KEY:}
      default-model: gemini-2.0-flash
      timeout-seconds: 30

    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      default-model: deepseek-chat
      timeout-seconds: 40

    ollama:
      base-url: http://localhost:11434
      api-key: ""
      default-model: llama3.2
      timeout-seconds: 60

  agents:
    event-agent:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.9
      max-tokens: 800
      timeout-seconds: 25
      retries: 2
      fallback-chain:
        - anthropic
        - ollama

    advisor-agent:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.4
      max-tokens: 1200
      timeout-seconds: 45
      retries: 1
      fallback-chain:
        - openai

    narrator-agent:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.85
      max-tokens: 400
      timeout-seconds: 15
      retries: 2
      fallback-chain:
        - openai
        - anthropic

    ai-player-agent:
      provider: ollama
      model: llama3.2
      temperature: 0.7
      max-tokens: 500
      timeout-seconds: 30
      retries: 0
      fallback-chain:
        - deepseek
        - anthropic

    debrief-agent:
      provider: deepseek
      model: deepseek-reasoner
      temperature: 1.0
      max-tokens: 2000
      timeout-seconds: 90
      retries: 1
      fallback-chain:
        - anthropic

    calibration-agent:
      provider: gemini
      model: gemini-2.0-flash
      temperature: 0.2
      max-tokens: 600
      timeout-seconds: 20
      retries: 2
      fallback-chain:
        - deepseek
        - anthropic

    risk-referee-agent:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.2
      max-tokens: 400
      timeout-seconds: 15
      retries: 2
      fallback-chain:
        - anthropic
